vidence:"secure: process.env.NODE_ENV === 'production'",cwe:"CWE-614",owasp:"A02:2021"},{id:"A-05",title:"JWT secret replaced from default placeholder",severity:"critical",status:"warn",category:"auth",description:'The default JWT secret was intentionally changed to "REPLACE_THIS_BEFORE_RUNNING_DO_NOT_USE_DEFAULT". This must be replaced with a cryptographically strong random secret before deployment. Any tokens signed with the placeholder are worthless.',evidence:'JWT_SECRET="REPLACE_THIS_BEFORE_RUNNING_DO_NOT_USE_DEFAULT"\n// .env.example — must be overridden in production .env',remediation:'Generate a 256-bit secret: openssl rand -hex 32. Set in your deployment environment. Validate at startup: if (secret === "REPLACE_THIS...") process.exit(1)',cwe:"CWE-321",owasp:"A02:2021"},{id:"A-06",title:"JWT expiry set to 7 days",severity:"medium",status:"warn",category:"auth",description:"JWT tokens expire after 7 days with no refresh token mechanism. Stolen tokens are valid for up to 7 days. Consider shorter expiry (1–2 days) with a sliding-window refresh for production, or implement token revocation.",evidence:"jwtService.sign(payload, { expiresIn: '7d' })",remediation:"Reduce to 1d expiry + implement refresh token endpoint, or add a token revocation list (Redis) for high-security deployments.",cwe:"CWE-613",owasp:"A07:2021"},{id:"A-07",title:"No brute-force protection on login endpoint",severity:"high",status:"todo",category:"auth",description:"POST /auth/login has no rate limiting or account lockout. An attacker can attempt unlimited passwords against any email address without triggering any defence.",evidence:"// No @Throttle() decorator on AuthController\n// No @nestjs/throttler module imported in AppModule",remediation:"Install @nestjs/throttler. Apply ThrottlerGuard globally. Set: ttl: 60, limit: 5 on /auth/login. Consider IP-based lockout after 10 failures.",cwe:"CWE-307",owasp:"A07:2021"},{id:"A-08",title:"No logout invalidation / token revocation",severity:"medium",status:"warn",category:"auth",description:"POST /auth/logout clears the cookie client-side but the JWT remains valid until it expires. If a token was copied before logout it can still be used for up to 7 days.",evidence:'res.clearCookie("auth_token"); // cookie cleared\n// JWT still valid server-side — no revocation list',remediation:"For MVP this is acceptable. For production: use short-lived tokens (1h) + refresh tokens, or maintain a Redis revocation set with the jti claim.",cwe:"CWE-613",owasp:"A07:2021"},{id:"B-01",title:"Global ValidationPipe with whitelist + forbidNonWhitelisted",severity:"critical",status:"pass",category:"api",description:"Applied globally in main.ts. whitelist: true strips undeclared fields. forbidNonWhitelisted: true throws 400 if unknown fields are sent — no silent field injection possible. transform: true auto-casts to DTO types.",evidence:"app.useGlobalPipes(new ValidationPipe({\n  whitelist: true,\n  forbidNonWhitelisted: true,\n  transform: true,\n}));",cwe:"CWE-20",owasp:"A03:2021"},{id:"B-02",title:"orgId always from JWT — never from request body",severity:"critical",status:"pass",category:"api",description:"No DTO includes an orgId field. Every service method receives orgId from @CurrentOrg() which extracts it from the verified JWT payload. Combined with whitelist:true, a client-supplied orgId is guaranteed to be stripped.",evidence:"async create(@Body() dto: CreateSupplierDto, @CurrentOrg() orgId: string)\n// dto has no orgId field → ValidationPipe strips any attempt",cwe:"CWE-639",owasp:"A01:2021"},{id:"B-03",title:"reviewedByUserId always from JWT — never from body",severity:"critical",status:"pass",category:"api",description:"UpdateDocumentDto does not include reviewedByUserId. The service explicitly sets it from the authenticated user: data: { ...dto, reviewedByUserId: user.id }. This prevents a user attributing an approval to someone else.",evidence:"return this.prisma.document.update({\n  where: { id },\n  data: { ...dto, reviewedByUserId: user.id }\n});",cwe:"CWE-639",owasp:"A01:2021"},{id:"B-04",title:"All protected routes use JwtAuthGuard",severity:"critical",status:"pass",category:"api",description:"Every protected controller class or method is decorated with @UseGuards(JwtAuthGuard). No protected route relies on implicit authentication. Auth routes (/auth/register, /auth/login, /auth/logout) are correctly left unprotected.",evidence:'@UseGuards(JwtAuthGuard)\n@Controller("suppliers")\nexport class SuppliersController { ... }',cwe:"CWE-862",owasp:"A01:2021"},{id:"B-05",title:"CORS restricted to configured origin",severity:"high",status:"pass",category:"api",description:"CORS is configured with a specific origin (WEB_URL env var) and credentials: true. The default falls back to http://localhost:3000 in development. This prevents cross-origin API access from arbitrary domains.",evidence:'app.enableCors({\n  origin: process.env.WEB_URL ?? "http://localhost:3000",\n  credentials: true,\n});',cwe:"CWE-942",owasp:"A05:2021"},{id:"B-06",title:"No rate limiting on any endpoint",severity:"high",status:"todo",category:"api",description:"No rate limiting is applied to any endpoint. This leaves the API vulnerable to DoS, enumeration attacks, and brute-force attempts beyond just the login endpoint.",evidence:"// @nestjs/throttler not installed\n// No ThrottlerGuard in AppModule providers",remediation:"npm install @nestjs/throttler. Add ThrottlerModule.forRoot({ ttl:60, limit:100 }) to AppModule. Apply stricter limits on auth endpoints.",cwe:"CWE-770",owasp:"A05:2021"},{id:"B-07",title:"No request body size limit configured",severity:"medium",status:"warn",category:"api",description:"Express default body size limit is 100kb for JSON. File uploads are capped at 20MB via multer limits. However, no explicit limit is set in main.ts for the JSON body parser, relying on Express defaults.",evidence:"// multer: limits: { fileSize: 20 * 1024 * 1024 }\n// JSON body: relies on Express default (100kb)",remediation:'Set explicit limit in main.ts: app.use(express.json({ limit: "1mb" })).',cwe:"CWE-400",owasp:"A05:2021"},{id:"B-08",title:"No Helmet HTTP security headers",severity:"medium",status:"todo",category:"api",description:"The API does not use @nestjs/helmet to set security headers (X-Frame-Options, X-Content-Type-Options, HSTS, CSP, etc.). While the API is consumed by the Next.js frontend (not a browser directly), best practice is to include these headers.",evidence:"// No helmet() middleware in main.ts",remediation:"npm install @nestjs/helmet. Add app.use(helmet()) in main.ts before other middleware.",cwe:"CWE-16",owasp:"A05:2021"},{id:"C-01",title:"Multi-tenancy: all queries scoped with orgId",severity:"critical",status:"pass",category:"data",description:"Every Prisma query in every service uses findFirst({ where: { id, orgId } }) — never findUnique by bare ID. This guarantees that a user in Org A cannot access Org B's data even if they know the record UUID.",evidence:"// CORRECT pattern enforced across all services:\nreturn this.prisma.supplier.findFirst({\n  where: { id, orgId }, // dual-key — org-scoped\n});",cwe:"CWE-284",owasp:"A01:2021"},{id:"C-02",title:"Cross-tenant access via nested resources prevented",severity:"critical",status:"pass",category:"data",description:"Contacts and ProductSupplier links receive a bare ID from the client. Before any mutation, the service joins through the parent entity to verify orgId. This prevents privilege escalation via guessing a nested resource ID.",evidence:"// verifyContactOwnership:\nwhere: { id, supplier: { orgId } }\n\n// verifyProductSupplierOwnership:\nwhere: { id: linkId, product: { orgId } }",cwe:"CWE-639",owasp:"A01:2021"},{id:"C-03",title:"DocumentType cross-org attachment prevented",severity:"high",status:"pass",category:"data",description:"Before uploading a document, the service verifies that the provided documentTypeId belongs to the same organisation as the supplier. Without this check, a user could attach a document type from a different organisation.",evidence:"// In documents.service.ts upload():\nconst docType = await this.prisma.documentType.findFirst({\n  where: { id: dto.documentTypeId, orgId },\n});\nif (!docType) throw new NotFoundException(...);",cwe:"CWE-284",owasp:"A01:2021"},{id:"C-04",title:"Soft deletes preserve audit trail integrity",severity:"medium",status:"pass",category:"data",description:"Compliance entities (Supplier, Product, DocumentType) are never hard-deleted — status is set to INACTIVE/DISCONTINUED. This preserves the full document and approval audit trail, which is required for EU compliance audits.",evidence:'// CORRECT:\nreturn this.prisma.supplier.update({\n  data: { status: "INACTIVE" },\n});\n// prisma.supplier.delete() is NEVER called',cwe:"CWE-212",owasp:"A09:2021"},{id:"C-05",title:"No SQL injection surface via raw queries",severity:"high",status:"pass",category:"data",description:"The entire codebase uses Prisma ORM typed query builders — no raw SQL strings, no prisma.$queryRaw with user input, and no string concatenation into queries. All user input passes through Prisma's parameterised query layer.",evidence:"// Prisma typed queries only — no $queryRaw in codebase\nthis.prisma.supplier.findMany({ where: { orgId, name: { contains: q } } })",cwe:"CWE-89",owasp:"A03:2021"},{id:"C-06",title:"User email uniqueness enforced at DB level",severity:"medium",status:"pass",category:"data",description:"User.email has @unique in the Prisma schema, backed by a PostgreSQL unique constraint. Duplicate registration attempts hit a P2002 error caught as ConflictException — not a silent overwrite.",evidence:"model User {\n  email String @unique\n}\n// P2002 caught → 409 ConflictException",cwe:"CWE-287",owasp:"A07:2021"},{id:"C-07",title:"No PII logged to console or external services",severity:"medium",status:"warn",category:"data",description:"No explicit logging framework is configured. The default NestJS logger prints request metadata but not body content. However, without a structured logging policy, accidental password or email logging in future code is a risk.",evidence:"// No Winston/Pino logger configured\n// NestJS default Logger used — logs method names, not bodies",remediation:"Add structured logging with Pino or Winston. Implement a logging interceptor that strips sensitive fields (password, token, secret) from all log output.",cwe:"CWE-532",owasp:"A09:2021"},{id:"D-01",title:"File MIME type from server-detected multer value only",severity:"high",status:"pass",category:"files",description:"Document mimeType is always set from file.mimetype which is server-detected by multer. UploadDocumentDto has no mimeType field — any client-supplied MIME type is stripped by the ValidationPipe before reaching the service.",evidence:"// In documents.service.ts:\ndata: { mimeType: file.mimetype } // server-detected\n// NOT: dto.mimeType — field does not exist in DTO",cwe:"CWE-434",owasp:"A08:2021"},{id:"D-02",title:"UUID-based filenames prevent path traversal",severity:"high",status:"pass",category:"files",description:"Uploaded files are stored with randomUUID() + extname() filenames. The original filename from the client is stored in the filename column for display only — it is never used as the storage path.",evidence:"const filename = `${randomUUID()}${extname(file.originalname)}`;\n// Original name stored in DB, never used as file path",cwe:"CWE-22",owasp:"A01:2021"},{id:"D-03",title:"File upload size capped at 20 MB",severity:"medium",status:"pass",category:"files",description:"multer limits.fileSize is set to 20MB. Requests exceeding this limit are rejected before the file reaches the service, preventing memory exhaustion from large upload attacks.",evidence:'@UseInterceptors(FileInterceptor("file", {\n  storage: memoryStorage(),\n  limits: { fileSize: 20 * 1024 * 1024 },\n}))',cwe:"CWE-400",owasp:"A05:2021"},{id:"D-04",title:"No file type validation (MIME whitelist)",severity:"high",status:"todo",category:"files",description:"There is no whitelist of allowed MIME types. Any file type can be uploaded — executable files (.exe, .sh), scripts (.js, .php), and SVG-embedded XSS payloads. While files are stored with UUID names and not executed, malicious files should be rejected.",evidence:"// No MIME type validation in FileInterceptor or documents.service.ts\n// file.mimetype is stored and returned but not validated",remediation:'Add MIME whitelist to FileInterceptor:\nfileFilter: (req, file, cb) => {\n  const allowed = ["application/pdf","image/jpeg","image/png","application/msword"];\n  cb(null, allowed.includes(file.mimetype));\n}',cwe:"CWE-434",owasp:"A08:2021"},{id:"D-05",title:"Uploaded files served publicly without auth",severity:"high",status:"warn",category:"files",description:"In development, /uploads/ is served as a static folder without authentication. Any person who knows or guesses a file URL can download it without being logged in. UUID filenames make URLs hard to guess but not impossible.",evidence:'// In main.ts (dev mode):\napp.useStaticAssets(join(__dirname, "uploads"), { prefix: "/uploads/" })',remediation:"In production: use S3 pre-signed URLs with short expiry (15 min). Remove the static assets route. Serve files via an authenticated /documents/:id/download endpoint that verifies orgId before generating the signed URL.",cwe:"CWE-200",owasp:"A01:2021"},{id:"D-06",title:"memoryStorage used — files never touch disk in transit",severity:"medium",status:"pass",category:"files",description:"multer is configured with memoryStorage() so the uploaded file is kept in RAM as a Buffer during processing. It is never written to a temp file on disk first, eliminating temp file races and undeleted temp files.",evidence:"storage: memoryStorage() // file.buffer available, no temp file",cwe:"CWE-377",owasp:"A05:2021"},{id:"E-01",title:"Database not exposed to public network",severity:"critical",status:"pass",category:"infra",description:"In docker-compose.yml, the postgres service exposes port 5432 on the host for local development. In production this port must not be publicly accessible. The api service connects via container DNS (postgres:5432) on the internal Docker network.",evidence:'# docker-compose.yml:\npostgres:\n  ports: ["5432:5432"] # ← remove in prod or restrict to 127.0.0.1',remediation:"In production docker-compose.override.yml: remove the ports mapping from postgres. Access the DB only via the internal container network.",cwe:"CWE-668",owasp:"A05:2021"},{id:"E-02",title:"Secrets not hardcoded in docker-compose.yml",severity:"high",status:"pass",category:"infra",description:"The docker-compose.yml uses ${JWT_SECRET} variable substitution instead of hardcoding the secret. Sensitive values are read from the host environment or a .env file that is gitignored.",evidence:"api:\n  environment:\n    JWT_SECRET: ${JWT_SECRET} # from host env",cwe:"CWE-798",owasp:"A02:2021"},{id:"E-03",title:".env file is gitignored",severity:"critical",status:"warn",category:"infra",description:".env files containing real secrets must be in .gitignore. The .env.example is safe to commit. Verify .gitignore explicitly lists .env and any environment-specific variants.",evidence:"# Verify with: git check-ignore -v apps/api/.env\n# Expected: .gitignore:N  .env",remediation:"Add to root .gitignore:\n.env\n.env.local\n.env.production\n.env.*\n!.env.example",cwe:"CWE-312",owasp:"A02:2021"},{id:"E-04",title:"No HTTPS configured (relies on reverse proxy)",severity:"high",status:"warn",category:"infra",description:"The NestJS app serves HTTP only. TLS termination is expected to be handled by a reverse proxy (Nginx, Caddy, or AWS ALB) in front of the application. This is an acceptable pattern but the reverse proxy configuration must be verified.",evidence:"// No TLS config in main.ts\n// Relies on: Nginx/Caddy/ALB terminating HTTPS externally",remediation:"Ensure HTTPS termination at the load balancer. Set HSTS header at the reverse proxy level. Verify secure cookie flag is enabled (NODE_ENV=production).",cwe:"CWE-319",owasp:"A02:2021"},{id:"E-05",title:"Docker containers run as root by default",severity:"medium",status:"todo",category:"infra",description:"The Dockerfile does not specify a non-root USER. Node.js containers should run as a non-privileged user (e.g., node) to limit blast radius if the container is compromised.",evidence:"// Dockerfile — no USER directive present\nFROM node:20-alpine AS runner\n// Missing: USER node",remediation:"Add to Dockerfile:\nRUN addgroup -S nexaloop && adduser -S nexaloop -G nexaloop\nUSER nexaloop",cwe:"CWE-250",owasp:"A05:2021"},{id:"E-06",title:"PostgreSQL using default credentials in development",severity:"medium",status:"warn",category:"infra",description:"docker-compose.yml sets POSTGRES_PASSWORD: nexaloop — a weak default that must be changed before production. The database is not accessible externally in production (per E-01) but the credential should still be strong.",evidence:"POSTGRES_USER: nexaloop\nPOSTGRES_PASSWORD: nexaloop # change before prod",remediation:"Generate a strong random password for the DB: openssl rand -hex 32. Store in a secret manager (AWS Secrets Manager, HashiCorp Vault).",cwe:"CWE-521",owasp:"A07:2021"},{id:"F-01",title:"Run npm audit before deployment",severity:"high",status:"todo",category:"deps",description:"No automated dependency vulnerability scanning is configured. Before deployment, run pnpm audit to check all production dependencies for known CVEs.",evidence:"// No .github/workflows/security.yml\n// No Dependabot or Snyk configured",remediation:"Run: pnpm --filter @nexaloop/api audit --prod\nFix any critical or high severity CVEs before deploying.\nSet up Dependabot or Snyk for automated ongoing scanning.",cwe:"CWE-1035",owasp:"A06:2021"},{id:"F-02",title:"No dependency pinning (uses ^ ranges)",severity:"medium",status:"warn",category:"deps",description:"package.json uses ^version ranges for all dependencies. This allows automatic minor/patch updates which could introduce breaking changes or security issues without explicit review.",evidence:'"@nestjs/core": "^10.0.0"\n"prisma": "^5.0.0"',remediation:"For production: use pnpm install --frozen-lockfile in CI/CD to ensure reproducible builds. Consider pinning major dependencies to exact versions in production.",cwe:"CWE-1357",owasp:"A06:2021"},{id:"G-01",title:"A01: Broken Access Control — overall assessment",severity:"critical",status:"pass",category:"owasp",description:"All data access is scoped by orgId from JWT. No IDOR vulnerabilities found in current codebase. JwtAuthGuard applied to all protected routes. No vertical privilege escalation vectors identified (all users within an org have same access in MVP — RBAC enforcement is Phase 6).",evidence:"findFirst({ where: { id, orgId } }) pattern applied consistently.\nJwtAuthGuard applied to all non-auth routes.",cwe:"CWE-284",owasp:"A01:2021"},{id:"G-02",title:"A02: Cryptographic Failures — overall assessment",severity:"high",status:"warn",category:"owasp",description:"bcrypt used for passwords (pass). JWT signed with HS256 (acceptable for single-server MVP). Weak default JWT secret must be replaced. HTTPS relies on reverse proxy (must be verified). File content not encrypted at rest in local dev.",evidence:"bcrypt(password, 10) ✓\nJWT HS256 ✓\nJWT_SECRET = placeholder ⚑\nHTTPS = external proxy (unverified)",remediation:"Replace JWT_SECRET with 256-bit random. Verify HTTPS at reverse proxy. For production file storage: S3 server-side encryption (SSE-S3 or SSE-KMS).",cwe:"CWE-311",owasp:"A02:2021"},{id:"G-03",title:"A03: Injection — overall assessment",severity:"critical",status:"pass",category:"owasp",description:"No SQL injection surface — Prisma ORM only, no $queryRaw with user input. No NoSQL injection (PostgreSQL not MongoDB). No command injection surfaces identified. Input validation via class-validator on all DTOs.",evidence:"Prisma parameterised queries throughout.\nNo String template in any database call.\nclass-validator DTOs on all endpoints.",cwe:"CWE-89",owasp:"A03:2021"},{id:"G-04",title:"A04: Insecure Design — overall assessment",severity:"medium",status:"warn",category:"owasp",description:"Multi-tenancy design is sound. Soft delete pattern preserves audit trail. No RBAC enforcement in current MVP (Phase 6 item) — all authenticated org members have equal write access. Document review attribution tied to JWT prevents spoofing.",evidence:"orgId isolation ✓\nSoft deletes ✓\nRBAC not enforced (planned Phase 6) ⚑",remediation:"Implement role-based guards in Phase 6: OWNER/ADMIN can approve documents, USER can only upload, VIEWER is read-only.",cwe:"CWE-693",owasp:"A04:2021"},{id:"G-05",title:"A05: Security Misconfiguration — overall assessment",severity:"high",status:"warn",category:"owasp",description:"Helmet headers missing. No rate limiting. Postgres port exposed on host in dev. Default credentials in docker-compose.yml. No explicit JSON body size limit. CORS correctly configured. ValidationPipe correctly configured.",evidence:"Helmet ✗ (add @nestjs/helmet)\nRate limiting ✗ (add @nestjs/throttler)\nPostgres port exposed in docker-compose ⚑\nCORS configured ✓\nValidationPipe configured ✓",remediation:"See individual items: B-06, B-08, E-01, E-06.",cwe:"CWE-16",owasp:"A05:2021"},{id:"G-06",title:"A06: Vulnerable Components — overall assessment",severity:"high",status:"todo",category:"owasp",description:"No automated dependency scanning configured. npm audit has not been run against the current dependency tree. Dependabot or Snyk not set up for ongoing monitoring.",evidence:"// No security scanning in CI/CD pipeline",remediation:"Run pnpm audit before deployment. Set up Dependabot in GitHub repository settings. Add weekly audit to CI/CD pipeline.",cwe:"CWE-1035",owasp:"A06:2021"},{id:"G-07",title:"A07: Auth Failures — overall assessment",severity:"high",status:"warn",category:"owasp",description:"JWT cookie auth correctly implemented. No brute-force protection on login. No account lockout. Session invalidation incomplete (cookie cleared but token not revoked). Password minimum 8 characters — acceptable for MVP.",evidence:"JWT httpOnly cookie ✓\nBrute-force protection ✗ ⚑\nToken revocation on logout ✗ ⚑\nPassword min length 8 ✓",remediation:"Add throttling to /auth/login. Consider reducing JWT expiry to 1 day with refresh tokens.",cwe:"CWE-287",owasp:"A07:2021"},{id:"G-08",title:"A08: Software Integrity Failures — overall assessment",severity:"medium",status:"warn",category:"owasp",description:"No file type validation on uploads (any MIME accepted). No antivirus scanning on uploaded files. No Content Security Policy headers. No Subresource Integrity on CDN assets. No code signing on Docker images.",evidence:"MIME whitelist ✗ ⚑\nAntivirus scanning ✗ (future consideration)\nCSP headers ✗ (add via Helmet)",remediation:"Add MIME whitelist to file upload. Enable Helmet CSP. For production: consider ClamAV scanning of uploads.",cwe:"CWE-494",owasp:"A08:2021"},{id:"G-09",title:"A09: Security Logging — overall assessment",severity:"medium",status:"warn",category:"owasp",description:"No structured security logging. Failed auth attempts not logged. No SIEM integration. NestJS default logger only. No audit log for document approvals/rejections.",evidence:"// No structured logger (Pino/Winston)\n// No audit event table in Prisma schema",remediation:"Phase 7: Add AuditLog entity in schema. Log: login success/failure, document approvals, org changes. Use Pino for structured JSON logs.",cwe:"CWE-778",owasp:"A09:2021"},{id:"G-10",title:"A10: SSRF — overall assessment",severity:"low",status:"pass",category:"owasp",description:"No user-controlled URLs are fetched server-side. No webhooks, no remote image loading, no URL-based document fetching. SSRF surface is minimal in current MVP scope.",evidence:"// No fetch(userProvidedUrl) patterns in codebase\n// No outbound HTTP calls from API except to S3 (hardcoded)",cwe:"CWE-918",owasp:"A10:2021"},{id:"H-01",title:"Personal data minimisation",severity:"medium",status:"warn",category:"gdpr",description:"The platform stores: user email, name (optional), and supplier contact email/phone/name. These are minimal and necessary for the compliance function. However, no data retention policy or automated deletion mechanism exists.",evidence:"User: email, name?\nContact: name, email?, phone?, role?",remediation:"Document data retention policy. Add account deletion endpoint that cascades to all org data. Consider anonymisation of inactive org data after 24 months."},{id:"H-02",title:"No data processing agreement or privacy policy",severity:"medium",status:"todo",category:"gdpr",description:"As a B2B SaaS platform storing EU supplier contact data, NEXALOOP must have a Data Processing Agreement (DPA), Privacy Policy, and Terms of Service before public launch.",evidence:"// No legal documents in repository",remediation:"Prepare DPA for B2B customers. Publish privacy policy on marketing site. Add DPA acceptance flow to onboarding."},{id:"H-03",title:"Data export / right to erasure not implemented",severity:"medium",status:"todo",category:"gdpr",description:"GDPR requires the ability to export all personal data and to erase a data subject on request. No such endpoints exist.",evidence:"// No GET /organisations/:id/export endpoint\n// No DELETE /organisations/:id cascade endpoint",remediation:"Implement: GET /auth/me/export (returns all user data as JSON), DELETE /auth/me (erases account and cascades to all owned data within the org)."},{id:"H-04",title:"Passwords are not recoverable",severity:"info",status:"pass",category:"gdpr",description:"bcrypt one-way hashing means passwords cannot be extracted from the database — compliant with GDPR data minimisation for credentials.",evidence:"bcrypt.hash(password, 10) — one-way, non-reversible"},{id:"H-05",title:"No password reset / forgot password flow",severity:"medium",status:"todo",category:"gdpr",description:"There is no forgot password endpoint. Users cannot recover access to their account. For a commercial product this is a significant UX and support burden issue as well as an accessibility concern.",evidence:"// No POST /auth/forgot-password in AuthController",remediation:"Implement email-based password reset using time-limited signed tokens (not JWTs). Token should expire after 15 minutes and be single-use."},{id:"Z-01",title:"Replace JWT_SECRET with cryptographically strong secret",severity:"critical",status:"todo",category:"checklist",description:"Generate: openssl rand -hex 32. Set in production environment secrets manager — never in the codebase or committed .env file.",evidence:"Required before any deployment.",remediation:"openssl rand -hex 32 > /tmp/secret && cat /tmp/secret"},{id:"Z-02",title:"Set NODE_ENV=production",severity:"critical",status:"todo",category:"checklist",description:"Enables secure cookie flag, S3 storage, and disables verbose stack traces in error responses.",evidence:"NODE_ENV=production in deployment environment"},{id:"Z-03",title:"Remove postgres ports mapping from docker-compose",severity:"high",status:"todo",category:"checklist",description:"The 5432:5432 port mapping exposes PostgreSQL to the host network. In production it should only be accessible internally via the Docker network.",evidence:'# Remove from docker-compose.yml production config:\n# ports: ["5432:5432"]'},{id:"Z-04",title:"Run pnpm audit --prod before deployment",severity:"high",status:"todo",category:"checklist",description:"Check all production dependencies for known CVEs. Fix critical and high severity findings before deploying.",evidence:"pnpm --filter @nexaloop/api audit --prod"},{id:"Z-05",title:"Add @nestjs/throttler rate limiting to auth routes",severity:"high",status:"todo",category:"checklist",description:"Protect /auth/login and /auth/register from brute-force attacks before going live.",evidence:"npm install @nestjs/throttler\n// Add ThrottlerModule to Ap
